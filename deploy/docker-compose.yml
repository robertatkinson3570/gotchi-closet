services:
  autorenew:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: gotchicloset-autorenew
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      # Persist companion memory/entitlements on the mounted volume (the container
      # user cannot write the default ./data under /app). Shares the autorenew volume.
      - COMPANION_DB_PATH=/srv/gotchicloset/data/companion.db
      # Pulse daily-metrics DB on the same writable volume (see server/pulse/store.ts).
      - PULSE_DB_PATH=/srv/gotchicloset/data/pulse.db
      # Steward enrollments/log DB on the writable volume too — the default ./data/steward.db
      # under /app is not writable, so status/log/enroll/cron would 500 without this.
      - STEWARD_DB_PATH=/srv/gotchicloset/data/steward.db
      # 3D render cache (official mirrors + composed models + posters) on the
      # persistent volume — inside the container FS it was wiped every deploy,
      # restarting the 18.6k prewarm from zero each time.
      - GOTCHI3D_CACHE_DIR=/srv/gotchicloset/data/gotchi3d-cache
      # Game Center: games.db auto-lands next to companion.db via the COMPANION_DB_PATH
      # fallback (server/games/store.ts). Admin allowlist = the operator's public wallets
      # that may approve/reject submissions (public addresses, not secrets).
      - GAME_CENTER_ADMINS=0xc4cb6cb969e8b4e309ab98e4da51b77887afad96,0xe0d4f8f6f04a42aed5a7ea4f68bc612e6a54a3c2
      # Steward hands-off automation: the cron submits session userOps through the co-located
      # Alto bundler (below). The PLAYER's 7702 account pays gas; the bundler executor only
      # fronts-and-is-reimbursed. Cron is a no-op until an owner enrolls via the wizard.
      - STEWARD_BUNDLER_URL=http://alto:3000
      - STEWARD_RPC_URL=https://mainnet.base.org
    ports:
      - "127.0.0.1:8791:8787"
    volumes:
      - autorenew_data:/srv/gotchicloset/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8787/api/lending/autorenew/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5

  # Self-hosted ERC-4337 bundler (Alto) for Steward session userOps — $0 vendor cost. It only
  # relays userOps; the player's 7702 account pays its own gas (no paymaster). The executor
  # wallet fronts each handleOps and is reimbursed in-protocol, so it needs only a small ETH
  # float. Not published to the host (no ports:) — only the autorenew app reaches it over the
  # compose network at http://alto:3000. EntryPoint v0.7.
  alto:
    image: ghcr.io/pimlicolabs/alto:latest
    container_name: gotchicloset-alto
    restart: unless-stopped
    command:
      - "--entrypoints"
      - "0x0000000071727De22E5E9d8BAf0edAc6f37da032"
      - "--executor-private-keys"
      - "${STEWARD_BUNDLER_EXECUTOR_KEY}"
      - "--utility-private-key"
      - "${STEWARD_BUNDLER_EXECUTOR_KEY}"
      - "--rpc-url"
      - "https://mainnet.base.org"
      - "--safe-mode"
      - "false"
      - "--port"
      - "3000"
    expose:
      - "3000"

volumes:
  autorenew_data:
