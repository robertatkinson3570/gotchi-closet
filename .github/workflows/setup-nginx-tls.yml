name: Setup nginx + TLS for api.gotchicloset.com

on:
  workflow_dispatch:
    inputs:
      email:
        description: "Contact email for Let's Encrypt"
        required: false
        default: "ratkinson701@gmail.com"

jobs:
  setup:
    runs-on: [self-hosted, gotchicloset-vps]
    timeout-minutes: 5
    steps:
      - name: Verify DNS resolves to this VPS (IPv4, via authoritative NS)
        run: |
          set -uxo pipefail
          command -v dig >/dev/null 2>&1 || apt-get install -y dnsutils
          IP_OBSERVED=$(curl -4 -fsS https://api.ipify.org)
          # Find authoritative NS for the apex domain (skip propagation lag)
          AUTH_NS=$(dig +short NS gotchicloset.com | head -1)
          echo "Authoritative NS: $AUTH_NS"
          IP_DNS=$(dig +short A api.gotchicloset.com @"$AUTH_NS" | head -1)
          echo "VPS public IPv4 : $IP_OBSERVED"
          echo "DNS A record    : $IP_DNS"
          if [[ -z "$IP_DNS" ]]; then
            echo "No A record at apex NS — DNS not configured yet"
            exit 1
          fi
          if [[ "$IP_OBSERVED" != "$IP_DNS" ]]; then
            echo "DNS does not point at this VPS — bailing so certbot doesn't fail"
            exit 1
          fi

      - name: Install nginx + certbot if missing
        run: |
          set -uxo pipefail
          command -v nginx >/dev/null 2>&1 || { apt-get update && apt-get install -y nginx; }
          command -v certbot >/dev/null 2>&1 || apt-get install -y certbot python3-certbot-nginx

      - name: Write nginx site (HTTP only — certbot will add HTTPS)
        run: |
          set -uxo pipefail
          cat > /etc/nginx/sites-available/api.gotchicloset.com <<'EOF'
          server {
              listen 80;
              listen [::]:80;
              server_name api.gotchicloset.com;

              # CORS handled by the Express app — just proxy through
              location / {
                  proxy_pass http://127.0.0.1:8791;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_read_timeout 60s;
              }
          }
          EOF
          ln -sf /etc/nginx/sites-available/api.gotchicloset.com /etc/nginx/sites-enabled/

          # Validate before any reload — IMPORTANT: don't break sibling apps
          nginx -t

          systemctl reload nginx

      - name: Run certbot (HTTP-01)
        run: |
          set -uxo pipefail
          # Idempotent — if cert already exists, this just confirms
          certbot --nginx \
            -d api.gotchicloset.com \
            --non-interactive \
            --agree-tos \
            -m "${{ inputs.email }}" \
            --redirect

          nginx -t
          systemctl reload nginx

      - name: Health check via public HTTPS
        run: |
          set -uxo pipefail
          for i in 1 2 3 4 5; do
            if curl -fsS --resolve api.gotchicloset.com:443:127.0.0.1 https://api.gotchicloset.com/api/lending/autorenew/health > /tmp/health.json; then
              cat /tmp/health.json
              echo
              exit 0
            fi
            echo "wait $i…"
            sleep 3
          done
          echo "public HTTPS health check failed"
          exit 1

      - name: Nginx diagnostics
        if: always()
        run: |
          set -uxo pipefail
          echo "==== sites-enabled ===="
          ls -la /etc/nginx/sites-enabled/ || true
          echo "==== api.gotchicloset.com effective config ===="
          nginx -T 2>/dev/null | grep -A 30 "server_name api.gotchicloset.com" || true
          echo "==== nginx -t ===="
          nginx -t || true
          echo "==== listening ports ===="
          ss -tlnp 2>/dev/null | grep -E "(:80\b|:443\b|:8791)" || true
          echo "==== nginx process ===="
          ps -ef | grep nginx | grep -v grep || true
          echo "==== local curls ===="
          curl -kfsv --resolve api.gotchicloset.com:443:127.0.0.1 https://api.gotchicloset.com/api/lending/autorenew/health 2>&1 | tail -30 || true
