# One-off, manually-triggered: move a small proof budget from the steward pet relayer
# (STEWARD_PET_RELAYER_KEY, Base mainnet) to the two throwaway proof wallets whose keys live
# in the local gitignored .env.testnet. Runs on the self-hosted VPS runner so the key never
# leaves GitHub-secret/VPS custody; only tx hashes are logged. Destinations are HARDCODED —
# no dispatch inputs, nothing to tamper with.
# 2026-07-03: destinations replaced — the original pair was leaked in a public commit
# (229d051) and swept by bots the moment it was funded. These are FRESH, never-committed keys.
name: Steward proof funding (one-off)

on:
  workflow_dispatch:

concurrency:
  group: steward-fund-proof
  cancel-in-progress: false

jobs:
  fund:
    runs-on: [self-hosted, gotchicloset-vps]
    timeout-minutes: 10
    steps:
      - name: Send 0.0012 ETH x2 from relayer to proof wallets (Base mainnet)
        env:
          KEY: ${{ secrets.STEWARD_PET_RELAYER_KEY }}
        run: |
          set -euo pipefail
          W=/tmp/steward-fund-$$
          mkdir -p "$W" && cd "$W"
          cat > fund.mjs <<'EOF'
          import { createWalletClient, createPublicClient, http, parseEther, formatEther } from "viem";
          import { privateKeyToAccount } from "viem/accounts";
          import { base } from "viem/chains";
          const key = process.env.KEY;
          if (!key) throw new Error("STEWARD_PET_RELAYER_KEY secret is empty");
          const account = privateKeyToAccount(key.startsWith("0x") ? key : `0x${key}`);
          const rpc = "https://mainnet.base.org";
          const pub = createPublicClient({ chain: base, transport: http(rpc) });
          const wallet = createWalletClient({ account, chain: base, transport: http(rpc) });
          // The two FRESH proof wallets (local-only .env.testnet EXECUTOR + OWNER, 2026-07-03).
          const DESTS = [
            "0x74B1be1bbced1eb31f58BE6562C3340fe941e027",
            "0x977AB61BFaD895B4b42c219bC4de7123e61AA41F",
          ];
          const AMT = parseEther("0.0012");
          console.log("relayer:", account.address, "start balance:", formatEther(await pub.getBalance({ address: account.address })), "ETH");
          for (const to of DESTS) {
            const hash = await wallet.sendTransaction({ to, value: AMT });
            await pub.waitForTransactionReceipt({ hash });
            console.log(`sent 0.0035 ETH -> ${to}  tx: ${hash}`);
          }
          console.log("final relayer balance:", formatEther(await pub.getBalance({ address: account.address })), "ETH");
          EOF
          docker run --rm -v "$W":/w -w /w -e KEY node:24 bash -lc \
            "npm init -y >/dev/null 2>&1 && npm i --silent viem@2.44.0 >/dev/null 2>&1 && node fund.mjs"
          rm -rf "$W"
