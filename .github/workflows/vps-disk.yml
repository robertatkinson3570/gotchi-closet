name: VPS disk report + safe cleanup

# Shows what's eating the disk and reclaims ONLY safe space: dangling Docker
# images (superseded builds — today's deploy spree left one ~1GB+ image per
# push) and the Docker build cache. Never touches running containers,
# volumes, or the gotchi3d cache.

on:
  workflow_dispatch:

jobs:
  disk:
    runs-on: [self-hosted, gotchicloset-vps]
    timeout-minutes: 15
    steps:
      - name: Safe cleanup (unused images + build cache)
        run: |
          set -u
          echo "==== df before ===="
          df -h / | tail -1
          # Remove ALL images not referenced by a container (running containers
          # keep theirs). Clears superseded build-spree images; next build just
          # re-pulls base layers. Safe for running services.
          echo "==== reclaiming unused images ===="
          timeout 300 docker image prune -a -f | tail -1 || echo "(image prune timed out, partial)"
          echo "==== reclaiming build cache ===="
          timeout 400 docker builder prune -a -f | tail -1 || echo "(builder prune timed out, partial)"
          echo "==== df after ===="
          df -h / | tail -1

      - name: Disk breakdown
        run: |
          set -u
          echo "==== docker system df ===="
          docker system df
          echo "==== images by size ===="
          docker images --format '{{.Repository}}:{{.Tag}} {{.Size}} {{.CreatedSince}}' | head -15
