name: Enable HTTP/2 on api.gotchicloset.com

# Browsers cap HTTP/1.1 at 6 connections per origin. 3D grids fire a probe
# pair per card, and cold poster renders legitimately hold a request for up
# to 45s — over 1.1 those long-holds starve every other card's probe and the
# whole grid looks wedged (user-reported). HTTP/2 multiplexes them all over
# one connection, so warm cards resolve instantly regardless of cold renders.

on:
  workflow_dispatch:

jobs:
  http2:
    runs-on: [self-hosted, gotchicloset-vps]
    timeout-minutes: 5
    steps:
      - name: Add http2 to the TLS listeners (idempotent)
        run: |
          set -euxo pipefail
          CONF=/etc/nginx/sites-available/api.gotchicloset.com
          echo "==== before ===="
          grep -n "listen" "$CONF"
          # Append http2 to every ssl listen line that doesn't have it yet.
          sed -i -E '/http2/! s/^([[:space:]]*listen[^;]*[[:space:]]ssl\b[^;]*);/\1 http2;/' "$CONF"
          echo "==== after ===="
          grep -n "listen" "$CONF"
          nginx -t
          systemctl reload nginx

      - name: Verify HTTP/2 answers (restart if reload didn't rebind)
        run: |
          set -euxo pipefail
          probe() { curl -so /dev/null -w '%{http_version}' --resolve api.gotchicloset.com:443:127.0.0.1 https://api.gotchicloset.com/api/lending/autorenew/health; }
          v=$(probe)
          echo "after reload: http_version=$v"
          if [ "$v" != "2" ]; then
            # Pre-1.25 nginx treats http2 as a listen-socket flag; a HUP reload
            # can keep the old socket. A restart rebinds (sub-second blip).
            nginx -V 2>&1 | tr ' ' '\n' | grep -i http_v2 || echo "(no http_v2 module?!)"
            nginx -T 2>/dev/null | grep -B2 -A8 "server_name api.gotchicloset.com" | head -40
            systemctl restart nginx
            sleep 2
            v=$(probe)
            echo "after restart: http_version=$v"
          fi
          [ "$v" = "2" ]
